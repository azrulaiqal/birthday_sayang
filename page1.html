<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #fce4ec, #f3e5f5);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            color: #4a4a4a;
        }

        /* --- NEW: The Starting Door Overlay --- */
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fce4ec, #f3e5f5);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .start-btn {
            background: #d81b60;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.3);
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }
        .start-btn:hover {
            background: #ad1457;
            transform: translateY(-3px);
        }
        /* -------------------------------------- */

        .container {
            max-width: 600px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
        }
        .curved-text {
            width: 100%;
            height: 150px;
        }
        .curved-text path {
            fill: transparent;
        }
        .curved-text text {
            font-size: 38px;
            font-weight: 600;
            fill: #d81b60;
            letter-spacing: 2px;
        }
        .hero-img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: -20px 0 20px 0;
        }
        .notes {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            padding: 0 15px;
        }
        .btn {
            background: #d81b60;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            display: inline-block;
        }
        .btn:hover {
            background: #ad1457;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(216, 27, 96, 0.3);
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h2>I have something for you...</h2>
        <button class="start-btn" onclick="startSurprise()">Open Surprise 💌</button>
    </div>

    <audio id="bday-audio" loop>
        <source src="index.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <svg class="curved-text" viewBox="0 0 500 150">
            <path id="curve" d="M 50 120 Q 250 10 450 120" />
            <text text-anchor="middle">
                <textPath startOffset="50%" href="#curve">Happy Birthday!</textPath>
            </text>
        </svg>

        <img src="g1.jpeg" alt="Birthday Girl" class="hero-img">

        <div class="notes">
            <p>Happy Birthday to the most amazing girl! 💖<br>I hope your day is as beautiful, bright, and wonderful as you are. I have prepared a little journey down memory lane for you.</p>
        </div>

        <a href="page2.html" class="btn">Let's Go! ✨</a>
    </div>

    <script>
        // This function runs when she clicks "Open Surprise"
        function startSurprise() {
            // 1. Hide the starting screen
            document.getElementById('start-overlay').style.display = 'none';
            
            // 2. Play the music!
            document.getElementById('bday-audio').play();
        }
    </script>

</body>
</html>
